- summary: |
    Не работает оплата корзины 
  environment: |
    Safari Версия 26.5 (21624.2.5.11.4)
    MacOS Tahoe Версия 26.5.1 (25F80)
  steps-to-reproduce: |
    1. Добавить товары в корзину
    2. Перейти в корзинц
    3. Нажать на кнопку оплаты товара
  expected-result: |
    Получим сообщение об успешной оплате
    Товары удалятся из корзины
    На сервер отправлен успешный запрос
  actual-result: |
    Товары остались в корзине
    Запрос не успешный
    Ошибка изображена на скриншоте assets/chechout_500.png

