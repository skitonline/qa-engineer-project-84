- summary: |
    Отсутствие оценки у товара в каталоге 
  environment: |
    Safari Версия 26.5 (21624.2.5.11.4)
    MacOS Tahoe Версия 26.5.1 (25F80)
  steps-to-reproduce: |
    1. Открыть главную страницу
  expected-result: |
    У каждого товара в каталоге указан его рейтинг 
  actual-result: |
    У товаров не указан рейтинг 

- summary: |
    Показаны не все товары при фильтриация по цене
  environment: |
    Safari Версия 26.5 (21624.2.5.11.4)
    MacOS Tahoe Версия 26.5.1 (25F80)
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Выставить значения в диапазоне цен, чтобы граница являлась ценой товара
  expected-result: |
    В выборку попадают товары стоимостью равной значениям границы диапазона 
  actual-result: |
    В выборку НЕ попадают товары стоимостью равной значениям границы диапазона 

