---
- summary: |
    Отображение каталога магазина 
  requirement: |
    В каталоге выводится название, рейтинг, цена со скидкой и без нее
  prerequisites: |
    Открыта главная страница сайта
  test-data: |
    Отсутствуют
  steps: |
    Отсутствуют
  expected-result: |
    Должны быть отображены товары с их: названием, рейтингом, ценой со скидкой и без нее

- summary: |
    Поиск товара по корректному ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, строка поиска пуста, 
    категория не выбрана, бренды не выбраны, в филтрах выбрано "in stock", диапазон цен не выбран
  test-data: |
    Строка поиска: "dior"
  steps: |
    - Заполняем строку поиска
  expected-result: |
    На странице результата поиска должны быть все товары, где в
    названии присутствует слово "dior" и только они

- summary: |
    Поиск товара по некорректному ключевому слову 
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, строка поиска пуста, 
    категория не выбрана, бренды не выбраны, в филтрах выбрано "in stock", диапазон цен не выбран
  test-data: |
    Строка поиска: "глисскур"
  steps: |
    - Заполняем строку поиска
  expected-result: |
    На странице результата поиска не должно быть товаров
    
- summary: |
    Поиск товара по категории
  requirement: |
    Пользователь должен иметь возможность искать товары по категориям 
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, строка поиска пуста, 
    категория не выбрана, бренды не выбраны, в филтрах выбрано "in stock", диапазон цен не выбран
  test-data: |
    Категория: "beauty"
  steps: |
    - Открываем выпадающий список, который называется "Category"
    - Выбираем  категорию
  expected-result: |
    На странице результата поиска должны быть все товары из категории "beauty" и только они

- summary: |
    Просмотр карточки товара 
  requirement: |
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, строка поиска пуста, 
    категория не выбрана, бренды не выбраны, в филтрах выбрано "in stock", диапазон цен не выбран
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем на карточку товара с названием  "Red Lipstick"
  expected-result: |
    Мы попадаем на страницу карточки товара, где отображается выбранный товар:
    его фотография, категория, название, сколько штук в наличии, цена со скидкой и без нее, 
    рейтинг и описание

- summary: |
    Поиск товаров по категории из раздела карточки товара
  requirement: |
    Пользователь должен иметь возможность найти товары той же категории, что и выбранный товар
  prerequisites: |
    Открыта страница товара "Essence Mascara Lash Princess"
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем на гиперссылку "#beauty"
  expected-result: |
    На странице результата поиска должны быть все товары из категории "beauty" и только они
    
- summary: |
    Добавление товара в корзину 
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, корзина пуста
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем кнопку "Add to cart" у товара "Red Lipstick
    - Переходим в раздел "Cart"
  expected-result: |
    В корзине мы видим выбранный товар и только его

- summary: |
    Добавление нескольких одинаковых товаров в корзину 
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, корзина пуста
  test-data: |
    Отсутствуют
  steps: |
    - Добавляем два одинаковых произвольных товара в коризну 
    - Переходим в раздел "cart"
  expected-result: |
    В корзине мы видим выбранный товар в количестве двух штук

- summary: |
    Добавление нескольких различных товаров в корзину 
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта главная страница сайта, язык сайта выбран английский, корзина пуста
  test-data: |
    Отсутствуют
  steps: |
    - Добавляем два различных произвольных товара в коризну 
    - Переходим в раздел "cart"
  expected-result: |
    В корзине мы видим выбранные товары и только их

- summary: |
    Удаление товара из корзины при условии того, что товар был добавлен в единственном экземпляре 
  requirement: |
    Пользователь должен иметь возможность удалить товар из корзины 
  prerequisites: |
    Язык сайта выбран английский, в корзине находится один товар "Red Lipstick" и только он,
    мы находимся в разделе "cart"
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем кнопку "Delete"
  expected-result: |
    В корзине не остается товаров
    
- summary: |
    Удаление товара из корзины при условии того, было добавлено несколько позиций одного товара
  requirement: |
    Пользователь должен иметь возможность удалить товар из корзины 
  prerequisites: |
    Язык сайта выбран английский, в корзине находятся два товара:
    "Red Lipstick" и "Apple", открыт раздел корзина 
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем кнопку "Delete" напротив товара "Red Lipstick"
  expected-result: |
    В корзине остается товар "Apple" и только он, общая сумма заказа корректно пересчитана  
    
- summary: |
    Очистка корзины 
  requirement: |
    Пользователь должен иметь возможность удалить все товары из корзины за одну операцию
  prerequisites: |
    Корзина не пуста, в ней находятся произвольное число товаров, мы находимся в разделе "cart"
  test-data: |
    Отсутствуют
  steps: |
    - Нажимаем кнопку "Clear cart"
  expected-result: |
    В корзине отсутствуют товары, стоимость товаров в корзине равна 0   
    
- summary: |
    Смена языка интерфейса на русский
  requirement: |
    Пользователь должен иметь возможность переключить язык интерфейса
  prerequisites: |
    Открыта главная страница, язык сайта выбран английский
  test-data: |
    Отсутствуют
  steps: |
    - В выпадающем списке в разделе "Language" выбираем "Russian"
  expected-result: |
    Язык интерфейса меняется на русский 
