bugreports:
  - summary: |
      Неверная выдача товаров для некорректной строки поиска
    environment: |
      Safari Версия 26.5 (21624.2.5.11.4)
      MacOS Tahoe Версия 26.5.1 (25F80)
    steps-to-reproduce: |
      1. Пишем в строке поиска "абракадабра"
    expected-result: |
      Отсутствие товаров в выдаче
    actual-result: |
      Показаны все товары
      
  - summary: |
      Не работает функция очистки корзины
    environment: |
      Safari Версия 26.5 (21624.2.5.11.4)
      MacOS Tahoe Версия 26.5.1 (25F80)
    steps-to-reproduce: |
      1. Добавляем товары в корзину
      2. Переходим в корзину
      3. Очищаем корзину
      4. Переходим на главную страницу
    expected-result: |
      Корзина пуста
    actual-result: |
      В корзине остались заказы 
      
  - summary: |
      Товары из корзины не сохраняются с перезаходом на сайт
    environment: |
      Safari Версия 26.5 (21624.2.5.11.4)
      MacOS Tahoe Версия 26.5.1 (25F80)
    steps-to-reproduce: |
      1. Добавляем товары в корзину
      2. Закрываем сайт
      3. Открываем сайт
      4. Переходим в корзину 
    expected-result: |
      Товары в корзине остались такие же, как были до 2 пункта
    actual-result: |
      Корзина пустая 
